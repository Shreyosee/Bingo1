<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BINGO</title>
  <style>
    :root {
      --green: #97c91e;
      --green-dark: #86b51b;
      --bg: #f6f6f4;
      --text: #111111;
      --grid: #d8d8d8;
      --frame: #ffffff;
      --locked-bg: #e8f6c9;
      --locked-text: #547514;
      --tracker-bg: #ffffff;
      --tracker-done: #dff0b8;
      --tracker-border: #d7d7d7;
      --disabled: #a7a8aa;
      --shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 64px 20px 48px;
      text-align: center;
    }

    h1 {
      margin: 0 0 26px;
      font-size: clamp(2.5rem, 5vw, 4.5rem);
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    .shuffle-btn {
      border: none;
      background: var(--green);
      color: #fff;
      font-size: clamp(1rem, 1.8vw, 1.1rem);
      padding: 16px 30px;
      border-radius: 10px;
      cursor: pointer;
      margin-bottom: 28px;
      min-width: 200px;
      box-shadow: 0 4px 10px rgba(151, 201, 30, 0.25);
    }

    .shuffle-btn:hover:not(:disabled) {
      background: var(--green-dark);
    }

    .shuffle-btn:disabled {
      background: var(--disabled);
      cursor: not-allowed;
      box-shadow: none;
    }

    .tracker {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin: 0 auto 28px;
      flex-wrap: wrap;
    }

    .tracker-letter {
      width: 58px;
      height: 58px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid var(--tracker-border);
      border-radius: 10px;
      background: var(--tracker-bg);
      font-size: 1.5rem;
      font-weight: 700;
      transition: all 0.2s ease;
    }

    .tracker-letter.done {
      background: var(--tracker-done);
      color: var(--locked-text);
      border-color: var(--green);
      text-decoration: line-through;
      text-decoration-thickness: 3px;
    }

    .status {
      min-height: 28px;
      margin-bottom: 20px;
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--green-dark);
    }

    .board-wrap {
      display: flex;
      justify-content: center;
      width: 100%;
    }

    .board-frame {
      background: var(--frame);
      padding: 14px;
      border-radius: 10px;
      box-shadow: var(--shadow);
    }

    table {
      border-collapse: collapse;
      table-layout: fixed;
      width: min(78vw, 560px);
      background: #fff;
    }

    td {
      border: 1px solid var(--grid);
      padding: 0;
      width: 20%;
    }

    .cell-btn {
      width: 100%;
      aspect-ratio: 1 / 1;
      border: none;
      background: #fff;
      color: var(--text);
      font-size: clamp(1.7rem, 3vw, 2.2rem);
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s ease, color 0.2s ease, transform 0.15s ease;
    }

    .cell-btn:hover:not(:disabled) {
      background: #fafafa;
      transform: scale(0.98);
    }

    .cell-btn:disabled,
    .cell-btn.locked {
      background: var(--locked-bg);
      color: var(--locked-text);
      cursor: not-allowed;
    }

    @media (max-width: 700px) {
      .page {
        padding-top: 44px;
      }

      .shuffle-btn {
        width: 100%;
        max-width: 260px;
      }

      .board-frame {
        padding: 10px;
      }

      table {
        width: min(92vw, 520px);
      }

      .cell-btn {
        font-size: clamp(1.35rem, 5.2vw, 1.9rem);
      }

      .tracker-letter {
        width: 50px;
        height: 50px;
        font-size: 1.3rem;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <h1>BINGO</h1>

    <button id="shuffleBtn" class="shuffle-btn" type="button">Shuffle Once</button>

    <div class="tracker" id="tracker" aria-label="BINGO progress">
      <div class="tracker-letter">B</div>
      <div class="tracker-letter">I</div>
      <div class="tracker-letter">N</div>
      <div class="tracker-letter">G</div>
      <div class="tracker-letter">O</div>
    </div>

    <div id="status" class="status" aria-live="polite"></div>

    <div class="board-wrap">
      <div class="board-frame">
        <table aria-label="Bingo board">
          <tbody id="board"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    const board = document.getElementById("board");
    const shuffleBtn = document.getElementById("shuffleBtn");
    const trackerLetters = document.querySelectorAll(".tracker-letter");
    const statusText = document.getElementById("status");

    let marked = [];
    let completedLines = new Set();
    let hasWon = false;

    function getNumbers() {
      return Array.from({ length: 25 }, (_, i) => i + 1);
    }

    function shuffle(numbers) {
      const arr = [...numbers];
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function resetGameState() {
      marked = Array.from({ length: 5 }, () => Array(5).fill(false));
      completedLines = new Set();
      hasWon = false;
      statusText.textContent = "";
      trackerLetters.forEach((letter) => letter.classList.remove("done"));
    }

    function updateTracker() {
      const score = Math.min(completedLines.size, 5);

      trackerLetters.forEach((letter, index) => {
        letter.classList.toggle("done", index < score);
      });

      if (score === 0) {
        statusText.textContent = "";
      } else if (score < 5) {
        statusText.textContent = `${score} line${score > 1 ? "s" : ""} completed`;
      } else {
        statusText.textContent = "Bingo! You win!";
      }
    }

    function disableRemainingCells() {
      document.querySelectorAll(".cell-btn").forEach((button) => {
        button.disabled = true;
      });
    }

    function checkCompletedLines() {
      for (let row = 0; row < 5; row++) {
        if (marked[row].every(Boolean)) {
          completedLines.add(`row-${row}`);
        }
      }

      for (let col = 0; col < 5; col++) {
        let fullColumn = true;
        for (let row = 0; row < 5; row++) {
          if (!marked[row][col]) {
            fullColumn = false;
            break;
          }
        }
        if (fullColumn) {
          completedLines.add(`col-${col}`);
        }
      }

      let mainDiagonal = true;
      for (let i = 0; i < 5; i++) {
        if (!marked[i][i]) {
          mainDiagonal = false;
          break;
        }
      }
      if (mainDiagonal) {
        completedLines.add("diag-main");
      }

      let antiDiagonal = true;
      for (let i = 0; i < 5; i++) {
        if (!marked[i][4 - i]) {
          antiDiagonal = false;
          break;
        }
      }
      if (antiDiagonal) {
        completedLines.add("diag-anti");
      }

      updateTracker();

      if (completedLines.size >= 5 && !hasWon) {
        hasWon = true;
        disableRemainingCells();
      }
    }

    function renderTable(numbers) {
      resetGameState();
      board.innerHTML = "";

      for (let row = 0; row < 5; row++) {
        const tr = document.createElement("tr");

        for (let col = 0; col < 5; col++) {
          const value = numbers[row * 5 + col];

          const td = document.createElement("td");
          const button = document.createElement("button");

          button.type = "button";
          button.className = "cell-btn";
          button.textContent = value;
          button.setAttribute("aria-label", `Number ${value}`);

          button.addEventListener("click", () => {
            if (hasWon) return;

            button.classList.add("locked");
            button.disabled = true;
            marked[row][col] = true;

            checkCompletedLines();
          });

          td.appendChild(button);
          tr.appendChild(td);
        }

        board.appendChild(tr);
      }
    }

    renderTable(getNumbers());

    shuffleBtn.addEventListener("click", () => {
      renderTable(shuffle(getNumbers()));
      shuffleBtn.disabled = true;
      shuffleBtn.textContent = "Shuffle Used";
    });
  </script>
</body>
</html>
