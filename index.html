<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Number Shuffle 1–25</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #f7f7f7;
    }

    h1 {
      margin-bottom: 20px;
    }

    table {
      border-collapse: collapse;
      background: white;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      margin-bottom: 20px;
    }

    td {
      width: 70px;
      height: 70px;
      text-align: center;
      vertical-align: middle;
      border: 1px solid #ccc;
      font-size: 24px;
      font-weight: bold;
    }

    button {
      padding: 10px 18px;
      font-size: 16px;
      cursor: pointer;
      border: none;
      background: #86BC25;
      color: white;
      border-radius: 6px;
    }

    button:disabled {
      background: #A7A8AA;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <h1>Shuffled Numbers 1–25</h1>
  <table id="numberTable"></table>
  <button id="shuffleBtn" onclick="shuffleOnce()">Shuffle Again</button>

  <script>
    let shuffleUsed = false;

    function shuffle(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
      return array;
    }

    function renderTable(numbers) {
      const table = document.getElementById("numberTable");
      table.innerHTML = "";

      for (let row = 0; row < 5; row++) {
        const tr = document.createElement("tr");
        for (let col = 0; col < 5; col++) {
          const td = document.createElement("td");
          td.textContent = numbers[row * 5 + col];
          tr.appendChild(td);
        }
        table.appendChild(tr);
      }
    }

    function generateTable() {
      const numbers = Array.from({ length: 25 }, (_, i) => i + 1);
      shuffle(numbers);
      renderTable(numbers);
    }

    function shuffleOnce() {
      if (shuffleUsed) return;

      generateTable();
      shuffleUsed = true;

      const btn = document.getElementById("shuffleBtn");
      btn.disabled = true;
      btn.textContent = "Shuffle Used";
    }

    generateTable();
  </script>
</body>
</html>
