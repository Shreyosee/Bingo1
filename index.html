<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bingo</title>
  <style>
    :root {
      --green: #97c91e;
      --green-dark: #86b51b;
      --bg: #f6f6f4;
      --text: #111111;
      --grid: #d7d7d7;
      --frame: #ffffff;
      --locked-bg: #e8f6c9;
      --locked-text: #547514;
      --disabled: #a7a8aa;
      --shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 70px 20px 48px;
      text-align: center;
    }

    h1 {
      margin: 0 0 34px;
      font-size: clamp(2.2rem, 4vw, 4rem);
      font-weight: 700;
      line-height: 1.15;
    }

    .shuffle-btn {
      border: none;
      background: var(--green);
      color: #fff;
      font-size: clamp(1rem, 1.8vw, 1.1rem);
      padding: 16px 30px;
      border-radius: 10px;
      cursor: pointer;
      margin-bottom: 54px;
      min-width: 200px;
      box-shadow: 0 4px 10px rgba(151, 201, 30, 0.25);
    }

    .shuffle-btn:hover:not(:disabled) {
      background: var(--green-dark);
    }

    .shuffle-btn:disabled {
      background: var(--disabled);
      cursor: not-allowed;
      box-shadow: none;
    }

    .board-wrap {
      display: flex;
      justify-content: center;
      width: 100%;
    }

    .board-frame {
      background: var(--frame);
      padding: 14px;
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    table {
      border-collapse: collapse;
      table-layout: fixed;
      width: min(78vw, 560px);
      background: #fff;
    }

    td {
      border: 1px solid var(--grid);
      padding: 0;
      width: 20%;
    }

    .cell-btn {
      width: 100%;
      aspect-ratio: 1 / 1;
      border: none;
      background: #fff;
      color: var(--text);
      font-size: clamp(1.7rem, 3vw, 2.2rem);
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s ease, color 0.2s ease, transform 0.15s ease;
    }

    .cell-btn:hover:not(:disabled) {
      background: #fafafa;
      transform: scale(0.98);
    }

    .cell-btn:disabled,
    .cell-btn.locked {
      background: var(--locked-bg);
      color: var(--locked-text);
      cursor: not-allowed;
    }

    @media (max-width: 700px) {
      .page {
        padding-top: 48px;
      }

      .shuffle-btn {
        margin-bottom: 34px;
        width: 100%;
        max-width: 260px;
      }

      .board-frame {
        padding: 10px;
      }

      table {
        width: min(92vw, 520px);
      }

      .cell-btn {
        font-size: clamp(1.35rem, 5.2vw, 1.9rem);
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <h1>Shuffled Numbers 1–25</h1>

    <button id="shuffleBtn" class="shuffle-btn" type="button">Shuffle Once</button>

    <div class="board-wrap">
      <div class="board-frame">
        <table aria-label="Shuffled numbers table">
          <tbody id="board"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    // Code Generated by Sidekick is for learning and experimentation purposes only.
    const board = document.getElementById("board");
    const shuffleBtn = document.getElementById("shuffleBtn");

    function getNumbers() {
      return Array.from({ length: 25 }, (_, i) => i + 1);
    }

    function shuffle(numbers) {
      const arr = [...numbers];
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function renderTable(numbers) {
      board.innerHTML = "";

      for (let row = 0; row < 5; row++) {
        const tr = document.createElement("tr");

        for (let col = 0; col < 5; col++) {
          const value = numbers[row * 5 + col];

          const td = document.createElement("td");
          const button = document.createElement("button");

          button.type = "button";
          button.className = "cell-btn";
          button.textContent = value;
          button.setAttribute("aria-label", `Number ${value}`);

          button.addEventListener("click", () => {
            button.classList.add("locked");
            button.disabled = true;
          });

          td.appendChild(button);
          tr.appendChild(td);
        }

        board.appendChild(tr);
      }
    }

    renderTable(getNumbers());

    shuffleBtn.addEventListener("click", () => {
      renderTable(shuffle(getNumbers()));
      shuffleBtn.disabled = true;
      shuffleBtn.textContent = "Shuffle Used";
    });
  </script>
</body>
</html>
